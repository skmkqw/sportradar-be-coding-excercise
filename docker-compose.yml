services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sports-calendar-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "${DB_PORT}:1433"
    volumes:
      - mssql-data:/var/opt/mssql
      - ./database/init-db.sql:/usr/config/init-db.sql

  backend:
    image: sports-calendar-api
    container_name: sports-calendar-api
    build:
      context: ./backend/src
      dockerfile: SportsCalendar.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - CONNECTION_STRING=Server=sqlserver,1433;Database=${DB_NAME};User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True;
    ports:
      - "5000:8080"
    depends_on:
      - sqlserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mssql-data:
